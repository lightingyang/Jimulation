# 设备配置
equipment:
  简化生产线:
    name: "简化生产线"
    description: "包含8个核心设备的简化配置"
    device_groups:
      前框:
        count: 1
        capacity: 1

        station_name: "前框"
      后框:
        count: 1
        capacity: 1

        station_name: "后框"
      侧板:
        count: 1
        capacity: 1

        station_name: "侧板"
      底架:
        count: 1
        capacity: 1

        station_name: "底架"
      顶板:
        count: 1
        capacity: 1

        station_name: "顶板"
      总装:
        count: 1
        capacity: 1

        station_name: "总装"
      油漆:
        count: 1
        capacity: 1

        station_name: "油漆"
      后置:
        count: 1
        capacity: 1

        station_name: "后置"

# 预处理线配置
preprocessing:
  line_speed: 35          # 预处理线速度（m/min）
  device_oee: 0.771       # 设备OEE（综合设备效率）

  manufacturer_efficiency:
    default:
      efficiency_ratio: 0.8
      description: "未知厂商"

    默认配置:
      efficiency_ratio: 1.0
      description: "正常效率，无额外监造影响"
